<svg viewBox="20 27 398 158" xmlns="http://www.w3.org/2000/svg">
<style>
.c1,.c2,.c3{opacity:0}
.c1{animation:fi .4s ease-out .05s forwards}
.c2{animation:fi .4s ease-out .20s forwards}
.c3{animation:fi .4s ease-out .35s forwards}
@keyframes fi{to{opacity:1}}

.a-spine{stroke-dashoffset:1;animation:draw .55s ease-in-out .50s forwards}
.a-head{opacity:0;animation:fi .15s ease-out .95s forwards}

.a-c1{transform-box:fill-box;transform-origin:center;animation:pop .22s cubic-bezier(.34,1.56,.64,1) .60s both}
.a-c2{transform-box:fill-box;transform-origin:center;animation:pop .22s cubic-bezier(.34,1.56,.64,1) .76s both}
.a-c3{transform-box:fill-box;transform-origin:center;animation:pop .22s cubic-bezier(.34,1.56,.64,1) .94s both}

.a-l1{transform-box:fill-box;transform-origin:left center;animation:widen .28s ease-out .66s both}
.a-l2{transform-box:fill-box;transform-origin:left center;animation:widen .28s ease-out .82s both}
.a-l3{transform-box:fill-box;transform-origin:left center;animation:widen .28s ease-out 1.00s both}

/* Typing — starts after v3 finishes */
.t0,.t1,.t2,.t3,.t4,.t5,.t6,.t7,.t8,.t9,.t10{opacity:0}
.t0 {animation:fi .08s steps(1) 1.34s forwards}
.t1 {animation:fi .08s steps(1) 1.40s forwards}
.t2 {animation:fi .08s steps(1) 1.46s forwards}
.t3 {animation:fi .08s steps(1) 1.52s forwards}
.t4 {animation:fi .08s steps(1) 1.58s forwards}
.t5 {animation:fi .08s steps(1) 1.64s forwards}
.t6 {animation:fi .08s steps(1) 1.70s forwards}
.t7 {animation:fi .08s steps(1) 1.76s forwards}
.t8 {animation:fi .08s steps(1) 1.82s forwards}
.t9 {animation:fi .08s steps(1) 1.88s forwards}
.t10{animation:fi .08s steps(1) 1.94s forwards}

/* Tagline fades in after typing completes */
.text-tagline{opacity:0;animation:fi .4s ease-out 2.12s forwards}

@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes widen{from{transform:scaleX(0)}to{transform:scaleX(1)}}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;animation-delay:.01ms!important}
}
</style>

<!-- Schema Cascade Mark -->
<path class="a-spine" d="M42,160 L42,50" fill="none" stroke="#0F6E56" stroke-width="2.5" stroke-dasharray="1" pathLength="1"/>
<path class="a-head" d="M36,55 L42,42 L48,55 Z" fill="#085041" stroke="#085041" stroke-width="1.5" stroke-linejoin="round"/>
<line class="a-l1" x1="49" y1="154" x2="54" y2="154" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
<line class="a-l2" x1="49" y1="127" x2="62" y2="127" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
<line class="a-l3" x1="49" y1="88" x2="76" y2="88" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
<circle class="a-c1" cx="42" cy="154" r="7" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="1.2"/>
<circle class="a-c2" cx="42" cy="127" r="7" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.2"/>
<circle class="a-c3" cx="42" cy="88" r="7" fill="#1D9E75" stroke="#085041" stroke-width="1.2"/>
<g class="c1"><rect x="54" y="138" width="128" height="32" rx="7" fill="#E1F5EE" stroke="#5DCAA5" stroke-width=".8"/><text x="61" y="158" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#085041">v1</text><line x1="89" y1="151" x2="160" y2="151" stroke="#5DCAA5" stroke-width="1.2" stroke-linecap="round"/><line x1="89" y1="162" x2="138" y2="162" stroke="#9FE1CB" stroke-width="1.2" stroke-linecap="round"/></g>
<g class="c2"><rect x="62" y="111" width="128" height="32" rx="7" fill="#5DCAA5" stroke="#0F6E56" stroke-width=".8"/><text x="69" y="131" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#085041">v2</text><line x1="97" y1="124" x2="168" y2="124" stroke="#0F6E56" stroke-width="1.2" stroke-linecap="round"/><line x1="97" y1="135" x2="146" y2="135" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/></g>
<g class="c3"><rect x="76" y="60" width="148" height="56" rx="8" fill="#1D9E75" stroke="#085041" stroke-width=".8"/><text x="83" y="84" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#fff">v3</text><line x1="111" y1="74" x2="202" y2="74" stroke="#9FE1CB" stroke-width="1.2" stroke-linecap="round"/><line x1="111" y1="85" x2="178" y2="85" stroke="#E1F5EE" stroke-width="1.2" stroke-linecap="round"/><line x1="111" y1="96" x2="192" y2="96" stroke="#9FE1CB" stroke-width="1.2" stroke-linecap="round"/><line x1="111" y1="107" x2="166" y2="107" stroke="#E1F5EE" stroke-width="1.2" stroke-linecap="round"/></g>

<!-- Two-tone typed wordmark -->
<text x="245" y="106" font-family="ui-monospace,monospace" font-size="24"><tspan class="t0" font-weight="700" fill="#085041">v</tspan><tspan class="t1" font-weight="700" fill="#085041">e</tspan><tspan class="t2" font-weight="700" fill="#085041">r</tspan><tspan class="t3" font-weight="700" fill="#085041">s</tspan><tspan class="t4" font-weight="700" fill="#085041">i</tspan><tspan class="t5" font-weight="700" fill="#085041">o</tspan><tspan class="t6" font-weight="700" fill="#085041">n</tspan><tspan class="t7" font-weight="400" fill="#1D9E75">a</tspan><tspan class="t8" font-weight="400" fill="#1D9E75">b</tspan><tspan class="t9" font-weight="400" fill="#1D9E75">l</tspan><tspan class="t10" font-weight="400" fill="#1D9E75">e</tspan></text>

<!-- Tagline — fades in after typing finishes -->
<text class="text-tagline" x="245" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="400" fill="#5DCAA5" textLength="158" lengthAdjust="spacing">python dataclass persistence</text>
</svg>