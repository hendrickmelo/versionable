name: CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          PR_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          git checkout origin/main -- pyproject.toml
          MAIN_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          git checkout HEAD -- pyproject.toml
          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::Version in pyproject.toml ($PR_VERSION) was not bumped. Each PR must increment the dev version."
            exit 1
          fi
          echo "Version bumped: $MAIN_VERSION -> $PR_VERSION"

  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [default, minimal]
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.9.1
        with:
          environments: ${{ matrix.environment }}

      - name: CI checks (${{ matrix.environment }})
        run: pixi run -e ${{ matrix.environment }} ci

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.9.1
        with:
          environments: docs

      - name: Build documentation
        run: pixi run -e docs docs

      - uses: actions/upload-artifact@v5
        with:
          name: docs-html
          path: docs/_build/html/
